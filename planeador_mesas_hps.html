<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Work+Sans:wght@400;500;600&display=swap');
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Work Sans', Arial, sans-serif; }
  .font-display { font-family: 'Cormorant Garamond', Georgia, serif; }
  .talavera-border {
    background-image:
      repeating-linear-gradient(45deg, #B5502E 0 6px, transparent 6px 14px),
      repeating-linear-gradient(-45deg, #2E5266 0 6px, transparent 6px 14px);
    background-size: 100% 4px, 100% 4px;
    background-position: top, bottom;
    background-repeat: no-repeat;
  }
  .min-h-screen { min-height: 100vh; }
  .flex { display: flex; }
  .flex-col { flex-direction: column; }
  .flex-wrap { flex-wrap: wrap; }
  .items-center { align-items: center; }
  .items-start { align-items: flex-start; }
  .justify-between { justify-content: space-between; }
  .justify-center { justify-content: center; }
  .gap-1 { gap: 4px; } .gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-5 { gap: 20px; }
  .w-full { width: 100%; } .h-full { height: 100%; }
  .mb-1 { margin-bottom: 4px; } .mb-3 { margin-bottom: 12px; } .mb-4 { margin-bottom: 16px; }
  .mt-2 { margin-top: 8px; }
  .p-5 { padding: 20px; }
  .space-y-2 > * + * { margin-top: 8px; }
  .space-y-3 > * + * { margin-top: 12px; }
  .space-y-4 > * + * { margin-top: 16px; }
  button { font-family: inherit; cursor: pointer; }
  select, textarea { font-family: inherit; }
  @media (min-width: 1024px) { .lg-row { flex-direction: row; } }
